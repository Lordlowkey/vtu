<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Data</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <div class="top-bar">
        <h2>🌐 Buy Data</h2>
    </div>

    <div class="balance-card">
        <h2>Purchase Data</h2>

        <form>

            <label>Select Network</label><br><br>

            <select>
                <option>MTN</option>
                <option>Airtel</option>
                <option>Glo</option>
                <option>9mobile</option>
            </select>

            <br><br>

            <label>Select Data Plan</label><br><br>

            <select>
                <option>500MB - ₦300</option>
                <option>1GB - ₦500</option>
                <option>2GB - ₦1000</option>
                <option>5GB - ₦2500</option>
                <option>10GB - ₦5000</option>
            </select>

            <br><br>

            <label>Phone Number</label><br><br>

            <input type="tel" placeholder="Enter phone number">

            <br><br>

            <button type="submit">Buy Data</button>

        </form>

        <br>

        <a href="dashboard.html">
            <button>← Back to Dashboard</button>
        </a>

    </div>

</div>

</body>
</html>
