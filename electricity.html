<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Electricity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <div class="top-bar">
        <h2>⚡ Pay Electricity</h2>
    </div>

    <div class="balance-card">
        <h2>Electricity Bill Payment</h2>

        <form>

            <label>Select Distribution Company</label><br><br>

            <select>
                <option>IKEDC</option>
                <option>EKEDC</option>
                <option>Abuja Disco</option>
                <option>Kano Disco</option>
                <option>Port Harcourt Disco</option>
                <option>Ibadan Disco</option>
                <option>Jos Disco</option>
                <option>Enugu Disco</option>
            </select>

            <br><br>

            <label>Meter Type</label><br><br>

            <select>
                <option>Prepaid</option>
                <option>Postpaid</option>
            </select>

            <br><br>

            <label>Meter Number</label><br><br>

            <input type="text" placeholder="Enter meter number">

            <br><br>

            <label>Amount (₦)</label><br><br>

            <input type="number" placeholder="Enter amount">

            <br><br>

            <button type="submit">Pay Electricity</button>

        </form>

        <br>

        <a href="dashboard.html">
            <button>← Back to Dashboard</button>
        </a>

    </div>

</div>

</body>
</html>
