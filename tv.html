<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Subscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <div class="top-bar">
        <h2>📺 TV Subscription</h2>
    </div>

    <div class="balance-card">
        <h2>Renew Your TV Subscription</h2>

        <form>

            <label>Select TV Provider</label><br><br>

            <select>
                <option>DSTV</option>
                <option>GOtv</option>
                <option>Startimes</option>
            </select>

            <br><br>

            <label>Select Package</label><br><br>

            <select>
                <option>DSTV Compact</option>
                <option>DSTV Premium</option>
                <option>GOtv Max</option>
                <option>GOtv Jolli</option>
                <option>Startimes Basic</option>
                <option>Startimes Smart</option>
            </select>

            <br><br>

            <label>Smart Card / IUC Number</label><br><br>

            <input type="text" placeholder="Enter Smart Card or IUC Number">

            <br><br>

            <button type="submit">Pay TV Subscription</button>

        </form>

        <br>

        <a href="dashboard.html">
            <button>← Back to Dashboard</button>
        </a>

    </div>

</div>

</body>
</html>
