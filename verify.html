<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

    <h2>Verify Your Account</h2>

    <p>Enter the 6-digit verification code sent to your email address or phone number.</p>

    <br>

    <form action="create-account.html">

        <label>Verification Code</label><br><br>

        <input type="text" maxlength="6" placeholder="Enter 6-digit code" required>

        <br><br>

        <button type="submit">Verify</button>

    </form>

    <br>

    <button type="button">Resend Code</button>

    <br><br>

    <a href="register.html">
        <button>← Back</button>
    </a>

</div>

</body>
</html>
